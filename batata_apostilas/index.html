<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batata Apostilas Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: black;
      overflow-x: hidden;
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(168, 85, 247, 0.5);
    }
  </style>
</head>
<body class="text-white min-h-screen relative">

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(139,92,246,0.35),transparent_35%)]"></div>
  <div class="absolute inset-0 grid-bg opacity-30"></div>

  <header class="sticky top-0 z-50 border-b border-white/10 bg-black/50 glass">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-3xl bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center text-2xl font-black shadow-2xl shadow-violet-500/40">
          B
        </div>

        <div>
          <h1 class="text-2xl font-black">Batata Apostilas</h1>
          <p class="text-zinc-400 text-sm">Open Future Hub</p>
        </div>
      </div>

      <div class="hidden md:flex items-center gap-4">
        <div class="px-5 py-3 rounded-2xl border border-white/10 bg-white/5">
          Ensino Fundamental
        </div>

        <div class="px-5 py-3 rounded-2xl border border-violet-500/30 bg-violet-500/20 text-violet-200">
          Ensino Médio em breve
        </div>
      </div>

    </div>
  </header>

  <main class="relative z-10 max-w-7xl mx-auto px-6 py-16">

    <section class="text-center mb-16">

      <div class="inline-flex items-center gap-3 px-5 py-2 rounded-full border border-violet-500/30 bg-violet-500/10 glass mb-6">
        <span class="text-violet-200 text-sm font-semibold tracking-[0.3em]">
          BATATA HUB
        </span>
      </div>

      <h1 class="text-6xl md:text-8xl font-black leading-none mb-8 bg-gradient-to-r from-white via-violet-200 to-violet-500 bg-clip-text text-transparent">
        Apostilas
        <br>
        Open Future
      </h1>

      <p class="max-w-3xl mx-auto text-zinc-400 text-lg leading-relaxed">
        Biblioteca premium para acessar apostilas escolares de forma moderna e organizada.
      </p>

    </section>

    <section class="mb-16">
      <input
        id="search"
        type="text"
        placeholder="Pesquisar apostilas..."
        class="w-full max-w-2xl mx-auto block h-16 px-6 rounded-3xl border border-white/10 bg-white/5 glass outline-none text-lg focus:border-violet-500/50"
      >
    </section>

    <div id="content" class="space-y-16"></div>

  </main>

  <script>

    const data = {
      "6º Ano": {
        "Volume 1": [
          ["Livro do Estudante - Amarelo", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/6ano/Livro%20do%20estudante%20Amarelo.pdf", "from-yellow-400 to-orange-500"],
          ["Livro do Estudante - Roxo", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/6ano/Livro%20do%20estudante%20Roxo.pdf", "from-violet-500 to-fuchsia-600"]
        ],
        "Volume 2": [
          ["Matemática & Português", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/6ano/matematicaportugues6anovol2.pdf", "from-cyan-500 to-blue-600"],
          ["História, Ciências, Geo, Inglês & Projeto", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/6ano/histciefeoinglprojeto6anovol2.pdf", "from-emerald-500 to-green-600"]
        ]
      },

      "7º Ano": {
        "Volume 1": [
          ["Livro Principal", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/7aano/1502147.pdf", "from-blue-500 to-indigo-600"],
          ["Livro Complementar", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/7aano/sla2.pdf", "from-pink-500 to-rose-600"]
        ],
        "Volume 2": [
          ["História, Ciências, Geo, Inglês & Projeto", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/7ano/histciengeoinglprojeto7anovol2.pdf", "from-green-500 to-emerald-600"],
          ["Matemática & Português", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/7ano/matematicaportugues7anovol2.pdf", "from-sky-500 to-cyan-600"]
        ]
      },

      "8º Ano": {
        "Volume 1": [
          ["Livro Principal", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/8anno/1502156.pdf", "from-purple-500 to-indigo-700"],
          ["Livro Complementar", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/8anno/sla3.pdf", "from-fuchsia-500 to-pink-600"]
        ],
        "Volume 2": [
          ["História, Ciências, Geo & Inglês", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/8ano/histciengeoing8anovol2.pdf", "from-lime-500 to-green-600"],
          ["Matemática & Português", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/8ano/matematicaportugues8anovol2.pdf", "from-blue-400 to-cyan-600"]
        ]
      },

      "9º Ano": {
        "Volume 1": [
          ["Livro Principal", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/9anno/1502161.pdf", "from-orange-500 to-red-600"],
          ["Livro Complementar", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/9anno/sla1.pdf", "from-violet-500 to-purple-700"]
        ],
        "Volume 2": [
          ["História, Ciências, Geo, Inglês & Projeto", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/9ano/histciengeoinglprojeto9anovol2.pdf", "from-emerald-500 to-green-700"],
          ["Matemática & Português", "https://pub-761ea6e47fa74db3a9b6ffc7656d8e73.r2.dev/OpenFuture/volume2/9ano/matematicaportugues9anovol2.pdf", "from-cyan-500 to-blue-700"]
        ]
      }
    };

    const content = document.getElementById('content');
    const search = document.getElementById('search');

    function render(filter = '') {
      content.innerHTML = '';

      Object.entries(data).forEach(([year, volumes]) => {

        let volumesHTML = '';

        Object.entries(volumes).forEach(([volume, books]) => {

          const filtered = books.filter(book =>
            book[0].toLowerCase().includes(filter.toLowerCase())
          );

          if (!filtered.length) return;

          volumesHTML += `
            <div class="rounded-[32px] border border-white/10 bg-black/30 p-6 glass">

              <div class="flex items-center justify-between mb-8">
                <div>
                  <h3 class="text-3xl font-black">${volume}</h3>
                  <p class="text-zinc-500 mt-1">Apostilas organizadas</p>
                </div>

                <div class="w-16 h-16 rounded-3xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center text-3xl">
                  📘
                </div>
              </div>

              <div class="space-y-5">

                ${filtered.map(book => `
                  <a href="${book[1]}" target="_blank" class="block">

                    <div class="card relative overflow-hidden rounded-[28px] border border-white/10 bg-zinc-950/90 transition-all duration-500 hover:shadow-2xl hover:shadow-violet-500/20">

                      <div class="absolute inset-0 bg-gradient-to-br ${book[2]} opacity-20"></div>

                      <div class="relative p-7 flex items-center justify-between gap-5">

                        <div>
                          <div class="inline-flex px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs uppercase tracking-[0.25em] text-violet-200 font-bold mb-4">
                            PDF
                          </div>

                          <h4 class="text-xl font-black leading-snug">
                            ${book[0]}
                          </h4>
                        </div>

                        <div class="min-w-[74px] h-[74px] rounded-3xl bg-white/5 border border-white/10 flex items-center justify-center text-2xl">
                          ↗
                        </div>

                      </div>
                    </div>

                  </a>
                `).join('')}

              </div>
            </div>
          `;
        });

        if (!volumesHTML) return;

        content.innerHTML += `
          <section class="rounded-[40px] border border-white/10 bg-white/[0.03] glass p-8 md:p-10 relative overflow-hidden">

            <div class="absolute top-0 right-0 w-96 h-96 bg-violet-500/10 blur-[120px] rounded-full"></div>

            <div class="relative z-10 mb-10">
              <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-200 text-sm mb-4">
                Ensino Fundamental
              </div>

              <h2 class="text-5xl font-black bg-gradient-to-r from-white to-violet-300 bg-clip-text text-transparent">
                ${year}
              </h2>
            </div>

            <div class="grid xl:grid-cols-2 gap-8 relative z-10">
              ${volumesHTML}
            </div>

          </section>
        `;
      });
    }

    render();

    search.addEventListener('input', (e) => {
      render(e.target.value);
    });

  </script>

</body>
</html>
